name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -v --tb=short
      - name: Engine stats sanity
        run: python -m engine.cli.main stats || true

  data-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate every JSON in data/
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path
          errors = 0
          for path in Path("data").rglob("*.json"):
              try:
                  with path.open() as f:
                      json.load(f)
              except json.JSONDecodeError as e:
                  print(f"::error file={path}::Invalid JSON: {e}")
                  errors += 1
          sys.exit(1 if errors else 0)
          PY

  emoji-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for forbidden emoji
        run: |
          if grep -rP '[\x{1F300}-\x{1F9FF}\x{2600}-\x{26FF}\x{2700}-\x{27BF}]' \
            --include='*.py' --include='*.json' --include='*.md' \
            --include='*.html' --include='*.css' --include='*.ts' \
            --include='*.js' --include='*.tsx' --include='*.jsx' \
            --exclude-dir='.git' --exclude-dir='node_modules' .; then
            echo "::error::Forbidden emoji detected"
            exit 1
          fi
